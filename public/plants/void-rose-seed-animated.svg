<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Void Rose Seed Animated">
  <title>Void Rose Seed Animated</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
    overflow: visible;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .soil { animation: soilBreath 6s ease-in-out infinite; }
  .plant { transform-origin: 110px 110px; animation: bob 3.8s ease-in-out infinite; }
  .bloom { transform-origin: 110px 110px; animation: bloomPulse 2.8s ease-in-out infinite; }
  .glow { transform-origin: 110px 110px; animation: glowPulse 2.2s ease-in-out infinite; }
  .sparkle { animation: twinkle 1.9s steps(2) infinite; }
  .sparkle2 { animation: twinkle 2.5s steps(2) infinite 0.5s; }
  .sparkle3 { animation: twinkle 2.1s steps(2) infinite 0.9s; }
  .floaty { animation: drift 4.5s ease-in-out infinite; }
  .floaty2 { animation: drift2 5.4s ease-in-out infinite; }
  .flicker { animation: flicker 1.25s steps(3) infinite; }
  .shimmer { animation: shimmer 3s linear infinite; }
  .rim { animation: rimPulse 2.6s ease-in-out infinite; }
  .lightning { animation: lightning 1.35s steps(2) infinite; }
  .moonGlow { animation: moonGlow 3s ease-in-out infinite; }
  .refract { animation: refract 2.8s linear infinite; }
  .seedCore { transform-origin: 110px 100px; animation: corePulse 2.4s ease-in-out infinite; }
  .stem { transform-origin: 110px 130px; animation: sway 3.6s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
  }
  @keyframes bloomPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes glowPulse {
    0%,100% { opacity: .35; }
    50% { opacity: .7; }
  }
  @keyframes twinkle {
    0%,100% { opacity: .35; }
    50% { opacity: 1; }
  }
  @keyframes drift {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(1px,-3px); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(-1px,-4px); }
  }
  @keyframes flicker {
    0%,100% { opacity: .75; }
    50% { opacity: 1; }
    75% { opacity: .55; }
  }
  @keyframes shimmer {
    0% { opacity: .55; }
    50% { opacity: .95; }
    100% { opacity: .55; }
  }
  @keyframes rimPulse {
    0%,100% { opacity: .3; }
    50% { opacity: .7; }
  }
  @keyframes lightning {
    0%,70%,100% { opacity: .5; }
    72%,76%,82% { opacity: 1; }
  }
  @keyframes moonGlow {
    0%,100% { opacity: .4; }
    50% { opacity: .85; }
  }
  @keyframes refract {
    0% { opacity: .7; }
    25% { opacity: 1; }
    50% { opacity: .6; }
    75% { opacity: .95; }
    100% { opacity: .7; }
  }
  @keyframes corePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }
  @keyframes sway {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
  }
  @keyframes soilBreath {
    0%,100% { opacity: 1; }
    50% { opacity: .96; }
  }
</style>
  
  <g class="soil">
  <ellipse cx="110" cy="175" rx="48" ry="12" fill="var(--shadow)" />
  <polygon points="110,36 152,50 182,82 190,112 178,146 150,170 110,182 70,170 42,146 30,112 38,82 68,50"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,52 144,64 166,88 172,112 164,136 142,154 110,164 78,154 56,136 48,112 54,88 76,64"
           fill="var(--soil-mid)"/>
  <polygon points="110,64 136,72 154,90 158,112 152,130 136,144 110,150 84,144 68,130 62,112 66,90 84,72"
           fill="var(--soil-light)" opacity="0.55"/>
  <rect x="74" y="92" width="8" height="8" fill="var(--soil-speck)" class="thin"/>
  <rect x="146" y="100" width="8" height="8" fill="var(--soil-speck)" class="thin"/>
  <rect x="118" y="138" width="8" height="8" fill="#8d6545" class="thin"/>
  </g>

  <g class="plant">
    <g class="stem">
      <rect x="106" y="108" width="8" height="20" fill="#5a7a55" class="outline"/>
      <polygon points="106,110 96,100 84,96 74,100 74,112 84,118 96,118 106,114" fill="#6c4c8d" class="outline"/>
      <polygon points="114,110 124,100 136,96 146,100 146,112 136,118 124,118 114,114" fill="#6c4c8d" class="outline"/>
    </g>
    <g class="seedCore">
      <circle cx="110" cy="100" r="12" fill="#141018" class="outline"/>
      <circle cx="110" cy="100" r="8" fill="#35214b" class="glow"/>
    </g>
    <circle cx="106" cy="97" r="1.8" fill="#ffffff" class="sparkle"/>
    <circle cx="115" cy="103" r="1.3" fill="#c8a6ff" class="sparkle2"/>
    <circle cx="111" cy="107" r="1.2" fill="#8fd2ff" class="sparkle3"/>
  </g>
</svg>