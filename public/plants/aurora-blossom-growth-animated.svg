<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Aurora Blossom Growth Animated">
  <title>Aurora Blossom Growth Animated</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
    overflow: visible;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .soil { animation: soilBreath 6s ease-in-out infinite; }
  .plant { transform-origin: 110px 110px; animation: bob 3.8s ease-in-out infinite; }
  .bloom { transform-origin: 110px 110px; animation: bloomPulse 2.8s ease-in-out infinite; }
  .glow { transform-origin: 110px 110px; animation: glowPulse 2.2s ease-in-out infinite; }
  .sparkle { animation: twinkle 1.9s steps(2) infinite; }
  .sparkle2 { animation: twinkle 2.5s steps(2) infinite 0.5s; }
  .sparkle3 { animation: twinkle 2.1s steps(2) infinite 0.9s; }
  .floaty { animation: drift 4.5s ease-in-out infinite; }
  .floaty2 { animation: drift2 5.4s ease-in-out infinite; }
  .flicker { animation: flicker 1.25s steps(3) infinite; }
  .shimmer { animation: shimmer 3s linear infinite; }
  .rim { animation: rimPulse 2.6s ease-in-out infinite; }
  .lightning { animation: lightning 1.35s steps(2) infinite; }
  .moonGlow { animation: moonGlow 3s ease-in-out infinite; }
  .refract { animation: refract 2.8s linear infinite; }
  .seedCore { transform-origin: 110px 100px; animation: corePulse 2.4s ease-in-out infinite; }
  .stem { transform-origin: 110px 130px; animation: sway 3.6s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
  }
  @keyframes bloomPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes glowPulse {
    0%,100% { opacity: .35; }
    50% { opacity: .7; }
  }
  @keyframes twinkle {
    0%,100% { opacity: .35; }
    50% { opacity: 1; }
  }
  @keyframes drift {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(1px,-3px); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(-1px,-4px); }
  }
  @keyframes flicker {
    0%,100% { opacity: .75; }
    50% { opacity: 1; }
    75% { opacity: .55; }
  }
  @keyframes shimmer {
    0% { opacity: .55; }
    50% { opacity: .95; }
    100% { opacity: .55; }
  }
  @keyframes rimPulse {
    0%,100% { opacity: .3; }
    50% { opacity: .7; }
  }
  @keyframes lightning {
    0%,70%,100% { opacity: .5; }
    72%,76%,82% { opacity: 1; }
  }
  @keyframes moonGlow {
    0%,100% { opacity: .4; }
    50% { opacity: .85; }
  }
  @keyframes refract {
    0% { opacity: .7; }
    25% { opacity: 1; }
    50% { opacity: .6; }
    75% { opacity: .95; }
    100% { opacity: .7; }
  }
  @keyframes corePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }
  @keyframes sway {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
  }
  @keyframes soilBreath {
    0%,100% { opacity: 1; }
    50% { opacity: .96; }
  }
</style>
  <defs>

<linearGradient id="auroraPetal" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#8eff9a"/>
  <stop offset="45%" stop-color="#73d7ff"/>
  <stop offset="72%" stop-color="#b07cff"/>
  <stop offset="100%" stop-color="#ff8fd5"/>
</linearGradient>

</defs>
  <g class="soil">
  <ellipse cx="110" cy="177" rx="54" ry="13" fill="var(--shadow)" />
  <polygon points="110,36 152,50 182,82 190,112 178,146 150,170 110,182 70,170 42,146 30,112 38,82 68,50"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,52 144,64 166,88 172,112 164,136 142,154 110,164 78,154 56,136 48,112 54,88 76,64"
           fill="var(--soil-mid)"/>
  <polygon points="110,64 136,72 154,90 158,112 152,130 136,144 110,150 84,144 68,130 62,112 66,90 84,72"
           fill="var(--soil-light)" opacity="0.38"/>
  </g>

  <g class="plant">
    <g class="stem">
      <polygon points="110,116 96,92 90,72 98,60 108,66 116,88" fill="#6eb993" class="outline"/>
      <polygon points="110,116 124,92 130,72 122,60 112,66 104,88" fill="#6eb993" class="outline"/>
      <polygon points="110,118 84,112 68,102 70,92 88,92 104,100" fill="#87d3aa" class="outline"/>
      <polygon points="110,118 136,112 152,102 150,92 132,92 116,100" fill="#87d3aa" class="outline"/>
      <polygon points="110,124 98,140 94,154 100,162 110,156 116,140" fill="#69b28c" class="outline"/>
      <polygon points="110,124 122,140 126,154 120,162 110,156 104,140" fill="#69b28c" class="outline"/>
    </g>
    <circle cx="110" cy="100" r="15" fill="url(#auroraPetal)" class="outline shimmer"/>
    <ellipse cx="106" cy="98" rx="7" ry="4" fill="#ffffff" opacity="0.25" class="glow"/>
    <rect x="94" y="88" width="4" height="4" fill="#eaffff" class="sparkle"/>
    <rect x="122" y="92" width="4" height="4" fill="#eaffff" class="sparkle2"/>
    <rect x="116" y="110" width="4" height="4" fill="#eaffff" class="sparkle3"/>
  </g>
</svg>