<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Prism Flower Full Animated">
  <title>Prism Flower Full Animated</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
    overflow: visible;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .soil { animation: soilBreath 6s ease-in-out infinite; }
  .plant { transform-origin: 110px 110px; animation: bob 3.8s ease-in-out infinite; }
  .bloom { transform-origin: 110px 110px; animation: bloomPulse 2.8s ease-in-out infinite; }
  .glow { transform-origin: 110px 110px; animation: glowPulse 2.2s ease-in-out infinite; }
  .sparkle { animation: twinkle 1.9s steps(2) infinite; }
  .sparkle2 { animation: twinkle 2.5s steps(2) infinite 0.5s; }
  .sparkle3 { animation: twinkle 2.1s steps(2) infinite 0.9s; }
  .floaty { animation: drift 4.5s ease-in-out infinite; }
  .floaty2 { animation: drift2 5.4s ease-in-out infinite; }
  .flicker { animation: flicker 1.25s steps(3) infinite; }
  .shimmer { animation: shimmer 3s linear infinite; }
  .rim { animation: rimPulse 2.6s ease-in-out infinite; }
  .lightning { animation: lightning 1.35s steps(2) infinite; }
  .moonGlow { animation: moonGlow 3s ease-in-out infinite; }
  .refract { animation: refract 2.8s linear infinite; }
  .seedCore { transform-origin: 110px 100px; animation: corePulse 2.4s ease-in-out infinite; }
  .stem { transform-origin: 110px 130px; animation: sway 3.6s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
  }
  @keyframes bloomPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes glowPulse {
    0%,100% { opacity: .35; }
    50% { opacity: .7; }
  }
  @keyframes twinkle {
    0%,100% { opacity: .35; }
    50% { opacity: 1; }
  }
  @keyframes drift {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(1px,-3px); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(-1px,-4px); }
  }
  @keyframes flicker {
    0%,100% { opacity: .75; }
    50% { opacity: 1; }
    75% { opacity: .55; }
  }
  @keyframes shimmer {
    0% { opacity: .55; }
    50% { opacity: .95; }
    100% { opacity: .55; }
  }
  @keyframes rimPulse {
    0%,100% { opacity: .3; }
    50% { opacity: .7; }
  }
  @keyframes lightning {
    0%,70%,100% { opacity: .5; }
    72%,76%,82% { opacity: 1; }
  }
  @keyframes moonGlow {
    0%,100% { opacity: .4; }
    50% { opacity: .85; }
  }
  @keyframes refract {
    0% { opacity: .7; }
    25% { opacity: 1; }
    50% { opacity: .6; }
    75% { opacity: .95; }
    100% { opacity: .7; }
  }
  @keyframes corePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }
  @keyframes sway {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
  }
  @keyframes soilBreath {
    0%,100% { opacity: 1; }
    50% { opacity: .96; }
  }
</style>
  <defs>

<linearGradient id="prismRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ff4d4d"/>
  <stop offset="18%" stop-color="#ff9f2f"/>
  <stop offset="36%" stop-color="#ffe94f"/>
  <stop offset="54%" stop-color="#5ee066"/>
  <stop offset="72%" stop-color="#4bb8ff"/>
  <stop offset="88%" stop-color="#8260ff"/>
  <stop offset="100%" stop-color="#ff70d2"/>
</linearGradient>

</defs>
  <g class="soil">
  <ellipse cx="110" cy="180" rx="58" ry="14" fill="var(--shadow)" />
  <polygon points="110,40 150,52 178,82 186,112 176,144 148,168 110,178 72,168 44,144 34,112 42,82 70,52"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,54 142,66 164,88 170,112 162,134 142,152 110,160 80,152 58,134 50,112 56,88 78,66"
           fill="var(--soil-mid)"/>
  </g>

  <g class="plant bloom">
    <polygon points="110,60 122,84 118,106 102,106 98,84" fill="url(#prismRainbow)" class="outline shimmer"/>
    <polygon points="146,80 132,96 118,108 126,120 146,114 158,98" fill="url(#prismRainbow)" class="outline shimmer"/>
    <polygon points="146,142 126,130 118,114 132,122 150,132" fill="url(#prismRainbow)" class="outline shimmer"/>
    <polygon points="110,160 102,134 106,116 114,116 118,134" fill="url(#prismRainbow)" class="outline shimmer"/>
    <polygon points="74,142 94,130 102,114 88,122 70,132" fill="url(#prismRainbow)" class="outline shimmer"/>
    <polygon points="74,80 88,96 102,108 94,120 74,114 62,98" fill="url(#prismRainbow)" class="outline shimmer"/>
    <circle cx="110" cy="110" r="14" fill="#ffffff" class="outline glow"/>
  </g>
  <line x1="110" y1="110" x2="152" y2="96" stroke="#ff4d4d" stroke-width="2" class="refract"/>
  <line x1="110" y1="110" x2="152" y2="106" stroke="#ff9f2f" stroke-width="2" class="refract"/>
  <line x1="110" y1="110" x2="152" y2="116" stroke="#ffe94f" stroke-width="2" class="refract"/>
  <line x1="110" y1="110" x2="152" y2="126" stroke="#5ee066" stroke-width="2" class="refract"/>
  <line x1="110" y1="110" x2="152" y2="136" stroke="#4bb8ff" stroke-width="2" class="refract"/>
  <rect x="80" y="82" width="4" height="4" fill="#ffffff" class="sparkle"/>
  <rect x="134" y="74" width="4" height="4" fill="#ffffff" class="sparkle2"/>
</svg>