<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Prism Flower Seed">
  <title>Prism Flower Seed</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
</style>
  <defs><linearGradient id="prismRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ff4d4d"/>
  <stop offset="18%" stop-color="#ff9f2f"/>
  <stop offset="36%" stop-color="#ffe94f"/>
  <stop offset="54%" stop-color="#5ee066"/>
  <stop offset="72%" stop-color="#4bb8ff"/>
  <stop offset="88%" stop-color="#8260ff"/>
  <stop offset="100%" stop-color="#ff70d2"/>
</linearGradient></defs>
  <ellipse cx="110" cy="175" rx="48" ry="12" fill="var(--shadow)" />
  <polygon points="110,36 152,50 182,82 190,112 178,146 150,170 110,182 70,170 42,146 30,112 38,82 68,50"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,52 144,64 166,88 172,112 164,136 142,154 110,164 78,154 56,136 48,112 54,88 76,64"
           fill="var(--soil-mid)"/>
  <polygon points="110,64 136,72 154,90 158,112 152,130 136,144 110,150 84,144 68,130 62,112 66,90 84,72"
           fill="var(--soil-light)" opacity="0.55"/>
  <rect x="74" y="92" width="8" height="8" fill="var(--soil-speck)" class="thin"/>
  <rect x="146" y="100" width="8" height="8" fill="var(--soil-speck)" class="thin"/>
  <rect x="118" y="138" width="8" height="8" fill="#8d6545" class="thin"/>

  <rect x="106" y="108" width="8" height="20" fill="#67a067" class="outline"/>
  <polygon points="106,110 96,100 84,96 74,100 74,112 84,118 96,118 106,114" fill="#bde5b5" class="outline"/>
  <polygon points="114,110 124,100 136,96 146,100 146,112 136,118 124,118 114,114" fill="#bde5b5" class="outline"/>
  <polygon points="110,90 122,100 118,114 102,114 98,100" fill="url(#prismRainbow)" class="outline"/>
  <polygon points="110,94 116,100 114,108 106,108 104,100" fill="#ffffff"/>
</svg>
