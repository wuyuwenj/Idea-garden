<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Prism Flower Full">
  <title>Prism Flower Full</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
</style>
  <defs><linearGradient id="prismRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#ff4d4d"/>
  <stop offset="18%" stop-color="#ff9f2f"/>
  <stop offset="36%" stop-color="#ffe94f"/>
  <stop offset="54%" stop-color="#5ee066"/>
  <stop offset="72%" stop-color="#4bb8ff"/>
  <stop offset="88%" stop-color="#8260ff"/>
  <stop offset="100%" stop-color="#ff70d2"/>
</linearGradient></defs>
  <ellipse cx="110" cy="180" rx="58" ry="14" fill="var(--shadow)" />
  <polygon points="110,40 150,52 178,82 186,112 176,144 148,168 110,178 72,168 44,144 34,112 42,82 70,52"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,54 142,66 164,88 170,112 162,134 142,152 110,160 80,152 58,134 50,112 56,88 78,66"
           fill="var(--soil-mid)"/>

  <polygon points="110,60 122,84 118,106 102,106 98,84" fill="url(#prismRainbow)" class="outline"/>
  <polygon points="146,80 132,96 118,108 126,120 146,114 158,98" fill="url(#prismRainbow)" class="outline"/>
  <polygon points="146,142 126,130 118,114 132,122 150,132" fill="url(#prismRainbow)" class="outline"/>
  <polygon points="110,160 102,134 106,116 114,116 118,134" fill="url(#prismRainbow)" class="outline"/>
  <polygon points="74,142 94,130 102,114 88,122 70,132" fill="url(#prismRainbow)" class="outline"/>
  <polygon points="74,80 88,96 102,108 94,120 74,114 62,98" fill="url(#prismRainbow)" class="outline"/>
  <circle cx="110" cy="110" r="14" fill="#ffffff" class="outline"/>
  <polygon points="110,110 140,100 152,96" fill="none" stroke="#ff4d4d" stroke-width="2"/>
  <polygon points="110,110 140,106 152,106" fill="none" stroke="#ff9f2f" stroke-width="2"/>
  <polygon points="110,110 140,112 152,116" fill="none" stroke="#ffe94f" stroke-width="2"/>
  <polygon points="110,110 140,118 152,126" fill="none" stroke="#5ee066" stroke-width="2"/>
  <polygon points="110,110 140,124 152,136" fill="none" stroke="#4bb8ff" stroke-width="2"/>
  <rect x="80" y="82" width="4" height="4" fill="#ffffff"/>
  <rect x="134" y="74" width="4" height="4" fill="#ffffff"/>
