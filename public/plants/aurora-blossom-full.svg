<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Aurora Blossom Full">
  <title>Aurora Blossom Full</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
</style>
  <defs><linearGradient id="auroraPetal" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#8eff9a"/>
  <stop offset="45%" stop-color="#73d7ff"/>
  <stop offset="72%" stop-color="#b07cff"/>
  <stop offset="100%" stop-color="#ff8fd5"/>
</linearGradient></defs>
  <ellipse cx="110" cy="180" rx="58" ry="14" fill="var(--shadow)" />
  <polygon points="110,40 150,52 178,82 186,112 176,144 148,168 110,178 72,168 44,144 34,112 42,82 70,52"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,54 142,66 164,88 170,112 162,134 142,152 110,160 80,152 58,134 50,112 56,88 78,66"
           fill="var(--soil-mid)"/>

  <polygon points="110,60 122,84 118,106 102,106 98,84" fill="url(#auroraPetal)" class="outline"/>
  <polygon points="146,80 132,96 118,108 126,120 146,114 158,98" fill="url(#auroraPetal)" class="outline"/>
  <polygon points="146,142 126,130 118,114 132,122 150,132" fill="url(#auroraPetal)" class="outline"/>
  <polygon points="110,160 102,134 106,116 114,116 118,134" fill="url(#auroraPetal)" class="outline"/>
  <polygon points="74,142 94,130 102,114 88,122 70,132" fill="url(#auroraPetal)" class="outline"/>
  <polygon points="74,80 88,96 102,108 94,120 74,114 62,98" fill="url(#auroraPetal)" class="outline"/>
  <circle cx="110" cy="110" r="16" fill="#f6ffff" class="outline"/>
  <circle cx="104" cy="106" r="3" fill="#a1ffd0"/>
  <circle cx="114" cy="108" r="3" fill="#d29dff"/>
  <rect x="130" y="72" width="4" height="4" fill="#ffffff"/>
  <rect x="78" y="88" width="4" height="4" fill="#d4fff0"/>
  <rect x="146" y="116" width="4" height="4" fill="#ffffff"/>
