<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Thunder Lotus Full">
  <title>Thunder Lotus Full</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
</style>
  
  <ellipse cx="110" cy="180" rx="58" ry="14" fill="var(--shadow)" />
  <polygon points="110,40 150,52 178,82 186,112 176,144 148,168 110,178 72,168 44,144 34,112 42,82 70,52"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,54 142,66 164,88 170,112 162,134 142,152 110,160 80,152 58,134 50,112 56,88 78,66"
           fill="var(--soil-mid)"/>

  <polygon points="110,64 124,86 120,110 100,110 96,86" fill="#47abff" class="outline"/>
  <polygon points="146,84 130,98 118,112 128,124 148,118 160,100" fill="#66c2ff" class="outline"/>
  <polygon points="146,142 126,130 118,116 132,124 152,134" fill="#56b5ff" class="outline"/>
  <polygon points="110,158 102,134 106,116 114,116 118,134" fill="#2d8fff" class="outline"/>
  <polygon points="74,142 94,130 102,116 88,124 68,134" fill="#56b5ff" class="outline"/>
  <polygon points="74,84 90,98 102,112 92,124 72,118 60,100" fill="#66c2ff" class="outline"/>
  <circle cx="110" cy="110" r="14" fill="#fff56d" class="outline"/>
  <circle cx="110" cy="110" r="7" fill="#fffbd5"/>
  <polyline points="106,82 112,94 108,100 116,110" fill="none" stroke="#eaffff" stroke-width="2.5"/>
  <polyline points="140,94 132,102 136,108 126,118" fill="none" stroke="#eaffff" stroke-width="2.5"/>
  <polyline points="86,96 94,104 90,110 100,120" fill="none" stroke="#eaffff" stroke-width="2.5"/>
  <polyline points="114,128 110,136 114,142" fill="none" stroke="#eaffff" stroke-width="2.5"/>
</svg>
