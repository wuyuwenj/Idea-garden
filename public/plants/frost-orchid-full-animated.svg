<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Frost Orchid Full Animated">
  <title>Frost Orchid Full Animated</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
    overflow: visible;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .soil { animation: soilBreath 6s ease-in-out infinite; }
  .plant { transform-origin: 110px 110px; animation: bob 3.8s ease-in-out infinite; }
  .bloom { transform-origin: 110px 110px; animation: bloomPulse 2.8s ease-in-out infinite; }
  .glow { transform-origin: 110px 110px; animation: glowPulse 2.2s ease-in-out infinite; }
  .sparkle { animation: twinkle 1.9s steps(2) infinite; }
  .sparkle2 { animation: twinkle 2.5s steps(2) infinite 0.5s; }
  .sparkle3 { animation: twinkle 2.1s steps(2) infinite 0.9s; }
  .floaty { animation: drift 4.5s ease-in-out infinite; }
  .floaty2 { animation: drift2 5.4s ease-in-out infinite; }
  .flicker { animation: flicker 1.25s steps(3) infinite; }
  .shimmer { animation: shimmer 3s linear infinite; }
  .rim { animation: rimPulse 2.6s ease-in-out infinite; }
  .core { transform-origin: 110px 100px; animation: corePulse 2.4s ease-in-out infinite; }
  .stem { transform-origin: 110px 132px; animation: sway 3.6s ease-in-out infinite; }
  .crystal { animation: prismPulse 2.8s ease-in-out infinite; }
  .frost { animation: frostPulse 3.2s ease-in-out infinite; }
  .starry { animation: starPulse 2.7s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0px);} 50% { transform: translateY(-2px);} }
  @keyframes bloomPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.03);} }
  @keyframes glowPulse { 0%,100% { opacity: .35;} 50% { opacity: .72;} }
  @keyframes twinkle { 0%,100% { opacity: .35;} 50% { opacity: 1;} }
  @keyframes drift { 0%,100% { transform: translate(0px,0px);} 50% { transform: translate(1px,-3px);} }
  @keyframes drift2 { 0%,100% { transform: translate(0px,0px);} 50% { transform: translate(-1px,-4px);} }
  @keyframes flicker { 0%,100% { opacity: .75;} 50% { opacity: 1;} 75% { opacity: .55;} }
  @keyframes shimmer { 0% { opacity: .55;} 50% { opacity: .95;} 100% { opacity: .55;} }
  @keyframes rimPulse { 0%,100% { opacity: .28;} 50% { opacity: .7;} }
  @keyframes corePulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.07);} }
  @keyframes sway { 0%,100% { transform: rotate(0deg);} 25% { transform: rotate(-1deg);} 75% { transform: rotate(1deg);} }
  @keyframes soilBreath { 0%,100% { opacity: 1;} 50% { opacity: .96;} }
  @keyframes prismPulse { 0%,100% { opacity: .85;} 50% { opacity: 1;} }
  @keyframes frostPulse { 0%,100% { opacity: .78;} 50% { opacity: 1;} }
  @keyframes starPulse { 0%,100% { opacity: .8;} 50% { opacity: 1;} }
</style>
  <g class="soil">
    <ellipse cx="110" cy="180" rx="58" ry="14" fill="var(--shadow)" />
    <polygon points="110,40 150,52 178,82 186,112 176,144 148,168 110,178 72,168 44,144 34,112 42,82 70,52"
             fill="var(--soil-dark)" class="outline"/>
    <polygon points="110,54 142,66 164,88 170,112 162,134 142,152 110,160 80,152 58,134 50,112 56,88 78,66"
             fill="var(--soil-mid)"/>
  </g>

  <g class="plant bloom">
    <polygon points="110,58 122,84 118,106 102,106 98,84" fill="#d9f7ff" class="outline frost"/>
    <polygon points="146,80 132,96 118,108 126,118 144,114 158,98" fill="#c1ecff" class="outline frost"/>
    <polygon points="146,142 126,130 118,114 132,122 150,132" fill="#d4f4ff" class="outline frost"/>
    <polygon points="110,160 102,134 106,116 114,116 118,134" fill="#e8fbff" class="outline frost"/>
    <polygon points="74,142 94,130 102,114 88,122 70,132" fill="#d4f4ff" class="outline frost"/>
    <polygon points="74,80 88,96 102,108 94,118 76,114 62,98" fill="#c1ecff" class="outline frost"/>
    <polygon points="110,66 116,84 110,96 104,84" fill="#ffffff" class="glow"/>
    <polygon points="146,86 136,96 128,104 136,106 146,100" fill="#ffffff" class="glow"/>
    <polygon points="142,136 132,128 126,120 136,124" fill="#ffffff" class="glow"/>
    <polygon points="110,152 106,136 110,124 114,136" fill="#ffffff" class="glow"/>
    <polygon points="78,136 88,128 94,120 84,124" fill="#ffffff" class="glow"/>
    <polygon points="74,86 84,96 92,104 84,106 74,100" fill="#ffffff" class="glow"/>
    <circle cx="110" cy="110" r="14" fill="#effcff" class="outline glow"/>
    <line x1="110" y1="100" x2="110" y2="120" stroke="#8dd3f0" stroke-width="3" class="sparkle"/>
    <line x1="100" y1="110" x2="120" y2="110" stroke="#8dd3f0" stroke-width="3" class="sparkle2"/>
    <line x1="103" y1="103" x2="117" y2="117" stroke="#8dd3f0" stroke-width="3" class="sparkle3"/>
    <line x1="117" y1="103" x2="103" y2="117" stroke="#8dd3f0" stroke-width="3" class="sparkle"/>
  </g>
  <rect x="130" y="74" width="4" height="4" fill="#ffffff" class="sparkle"/>
  <rect x="80" y="86" width="4" height="4" fill="#ffffff" class="sparkle2"/>
  <rect x="150" y="120" width="4" height="4" fill="#dff9ff" class="sparkle3"/>
  <rect x="94" y="148" width="4" height="4" fill="#ffffff" class="sparkle"/>
</svg>