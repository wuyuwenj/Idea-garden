<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
<style>
@keyframes idleBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-0.4px); } }
@keyframes leafSway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1.5deg); } }
@keyframes petalPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
@keyframes glowBreath { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.85; } }
@keyframes twinkle { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
@keyframes emberFloat { 0% { transform: translateY(0); opacity: 0.9; } 50% { transform: translateY(-0.5px); opacity: 1; } 100% { transform: translateY(-1px); opacity: 0.1; } }
@keyframes lightningFlash { 0%, 65%, 100% { opacity: 0.45; } 68%, 74% { opacity: 1; } }
@keyframes shimmer { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
.anim-bob { animation: idleBob 3.5s ease-in-out infinite; transform-origin: 50% 100%; }
.anim-sway { animation: leafSway 3s ease-in-out infinite alternate; transform-origin: 50% 100%; }
.anim-pulse { animation: petalPulse 4s ease-in-out infinite; transform-origin: 50% 80%; }
.anim-glow { animation: glowBreath 3.5s ease-in-out infinite; }
.anim-twinkle { animation: twinkle 2.5s ease-in-out infinite; }
.anim-ember { animation: emberFloat 2.5s linear infinite; }
.anim-lightning { animation: lightningFlash 3s infinite; }
.anim-shimmer { animation: shimmer 3s ease-in-out infinite; }
svg { image-rendering: pixelated; shape-rendering: crispEdges; }
</style>
