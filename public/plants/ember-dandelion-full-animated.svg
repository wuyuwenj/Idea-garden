<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Ember Dandelion Full Animated">
  <title>Ember Dandelion Full Animated</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
    --soil-speck: #c99c70;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
    overflow: visible;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .soil { animation: soilBreath 6s ease-in-out infinite; }
  .plant { transform-origin: 110px 110px; animation: bob 3.8s ease-in-out infinite; }
  .bloom { transform-origin: 110px 110px; animation: bloomPulse 2.8s ease-in-out infinite; }
  .glow { transform-origin: 110px 110px; animation: glowPulse 2.2s ease-in-out infinite; }
  .sparkle { animation: twinkle 1.9s steps(2) infinite; }
  .sparkle2 { animation: twinkle 2.5s steps(2) infinite 0.5s; }
  .sparkle3 { animation: twinkle 2.1s steps(2) infinite 0.9s; }
  .floaty { animation: drift 4.5s ease-in-out infinite; }
  .floaty2 { animation: drift2 5.4s ease-in-out infinite; }
  .flicker { animation: flicker 1.25s steps(3) infinite; }
  .shimmer { animation: shimmer 3s linear infinite; }
  .rim { animation: rimPulse 2.6s ease-in-out infinite; }
  .lightning { animation: lightning 1.35s steps(2) infinite; }
  .moonGlow { animation: moonGlow 3s ease-in-out infinite; }
  .refract { animation: refract 2.8s linear infinite; }
  .seedCore { transform-origin: 110px 100px; animation: corePulse 2.4s ease-in-out infinite; }
  .stem { transform-origin: 110px 130px; animation: sway 3.6s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
  }
  @keyframes bloomPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes glowPulse {
    0%,100% { opacity: .35; }
    50% { opacity: .7; }
  }
  @keyframes twinkle {
    0%,100% { opacity: .35; }
    50% { opacity: 1; }
  }
  @keyframes drift {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(1px,-3px); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0px,0px); }
    50% { transform: translate(-1px,-4px); }
  }
  @keyframes flicker {
    0%,100% { opacity: .75; }
    50% { opacity: 1; }
    75% { opacity: .55; }
  }
  @keyframes shimmer {
    0% { opacity: .55; }
    50% { opacity: .95; }
    100% { opacity: .55; }
  }
  @keyframes rimPulse {
    0%,100% { opacity: .3; }
    50% { opacity: .7; }
  }
  @keyframes lightning {
    0%,70%,100% { opacity: .5; }
    72%,76%,82% { opacity: 1; }
  }
  @keyframes moonGlow {
    0%,100% { opacity: .4; }
    50% { opacity: .85; }
  }
  @keyframes refract {
    0% { opacity: .7; }
    25% { opacity: 1; }
    50% { opacity: .6; }
    75% { opacity: .95; }
    100% { opacity: .7; }
  }
  @keyframes corePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }
  @keyframes sway {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
  }
  @keyframes soilBreath {
    0%,100% { opacity: 1; }
    50% { opacity: .96; }
  }
</style>
  
  <g class="soil">
  <ellipse cx="110" cy="180" rx="58" ry="14" fill="var(--shadow)" />
  <polygon points="110,40 150,52 178,82 186,112 176,144 148,168 110,178 72,168 44,144 34,112 42,82 70,52"
           fill="var(--soil-dark)" class="outline"/>
  <polygon points="110,54 142,66 164,88 170,112 162,134 142,152 110,160 80,152 58,134 50,112 56,88 78,66"
           fill="var(--soil-mid)"/>
  </g>

  <g class="plant">
    <line x1="110" y1="122" x2="110" y2="88" stroke="#86a75a" stroke-width="4" class="stem"/>
    <circle cx="110" cy="86" r="14" fill="#ffd56b" class="outline glow"/>
    <line x1="110" y1="86" x2="110" y2="60" stroke="#fdf5cf" stroke-width="2"/>
    <line x1="110" y1="86" x2="130" y2="66" stroke="#fdf5cf" stroke-width="2"/>
    <line x1="110" y1="86" x2="84" y2="72" stroke="#fdf5cf" stroke-width="2"/>
    <line x1="110" y1="86" x2="138" y2="84" stroke="#fdf5cf" stroke-width="2"/>
    <line x1="110" y1="86" x2="82" y2="92" stroke="#fdf5cf" stroke-width="2"/>
    <line x1="110" y1="86" x2="128" y2="104" stroke="#fdf5cf" stroke-width="2"/>
    <line x1="110" y1="86" x2="92" y2="106" stroke="#fdf5cf" stroke-width="2"/>
    <circle cx="110" cy="86" r="5" fill="#fff2bd"/>
  </g>
  <polygon points="110,56 116,62 114,70 108,70 104,62" fill="#ff8a31" class="outline flicker floaty"/>
  <polygon points="132,62 138,68 136,76 130,76 126,68" fill="#ffb34f" class="outline flicker floaty2"/>
  <polygon points="80,68 86,74 84,82 78,82 74,74" fill="#ff6d2a" class="outline flicker floaty"/>
  <polygon points="142,82 148,88 146,96 140,96 136,88" fill="#ff8a31" class="outline flicker floaty2"/>
  <polygon points="74,90 80,96 78,104 72,104 68,96" fill="#ffb34f" class="outline flicker floaty"/>
  <polygon points="128,102 134,108 132,116 126,116 122,108" fill="#ff6d2a" class="outline flicker floaty2"/>
  <polygon points="88,104 94,110 92,118 86,118 82,110" fill="#ff8a31" class="outline flicker floaty"/>
</svg>