    --leaf-dark: #3f6a2f;
    --leaf-mid: #5d8d43;
    --leaf-light: #86b75f;
    --leaf-hi: #b9d97f;
  }
  svg {
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .outline {
    stroke: var(--line);
    stroke-width: 3;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
  .thin {
    stroke: var(--line);
    stroke-width: 2;
    stroke-linejoin: miter;
    stroke-linecap: square;
    paint-order: stroke fill;
  }
</style>
