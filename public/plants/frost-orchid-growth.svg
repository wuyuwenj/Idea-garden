<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Frost Orchid Growth">
  <title>Frost Orchid Growth</title>
  <style>
  :root {
    --line: #28311f;
    --shadow: rgba(0, 0, 0, 0.18);
    --soil-dark: #6a472f;
    --soil-mid: #83583a;
    --soil-light: #a3734f;
